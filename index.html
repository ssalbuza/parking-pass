<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>주차권 수령 등록</title>
<style>
  :root {
    --paper: #F1EFE7; --paper-line: #DAD5C6; --ink: #1D2430;
    --ink-soft: #5B5F52; --navy: #26344F; --navy-deep: #16233B; --seal: #A9362A;
  }
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, 'Malgun Gothic', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif; color: var(--ink); background: var(--paper); }
  .ledger-header { padding: 28px 24px 20px; border-bottom: 2px solid var(--navy-deep); }
  .ledger-title { font-size: 22px; font-weight: 700; margin: 0; color: var(--navy-deep); }
  .ledger-sub { font-size: 13px; color: var(--ink-soft); margin: 6px 0 0; }
  .section { padding: 20px 24px 40px; max-width: 640px; margin: 0 auto; }
  .card { background: #FCFBF7; border: 1px solid var(--paper-line); border-radius: 6px; padding: 18px 20px; }
  .field-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: var(--ink-soft); margin-bottom: 5px; }
  .field input { width: 100%; height: 36px; border: 1px solid var(--paper-line); border-radius: 4px; padding: 0 10px; font-size: 13px; background: #fff; color: var(--ink); font-family: inherit; }
  .items-table { width: 100%; border-collapse: collapse; margin-bottom: 10px; }
  .items-table th { text-align: left; font-size: 11px; color: var(--ink-soft); font-weight: 700; padding: 0 6px 6px; border-bottom: 1px solid var(--paper-line); }
  .items-table td { padding: 4px 6px; vertical-align: top; }
  .items-table input { width: 100%; height: 32px; border: 1px solid var(--paper-line); border-radius: 4px; padding: 0 8px; font-size: 13px; font-family: inherit; }
  .row-remove { background: none; border: none; color: var(--seal); cursor: pointer; font-size: 16px; padding: 4px 6px; }
  .btn-add-row { background: none; border: 1px dashed var(--paper-line); color: var(--navy); font-size: 12px; padding: 7px 12px; border-radius: 4px; cursor: pointer; font-family: inherit; }
  .actions-row { display: flex; justify-content: space-between; align-items: center; margin-top: 14px; }
  .btn-submit { background: var(--navy-deep); color: #fff; border: none; border-radius: 4px; padding: 10px 22px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-submit:disabled { opacity: 0.5; cursor: default; }
  .msg-inline { font-size: 12px; color: var(--seal); margin-top: 8px; display: none; }
  .thankyou { padding: 60px 24px; text-align: center; }
  .thankyou h2 { font-size: 19px; margin: 10px 0 6px; color: var(--navy-deep); }
  .thankyou p { font-size: 13px; color: var(--ink-soft); margin: 0 0 20px; }
  @media (max-width: 560px) { .field-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div id="app-root"></div>
<script>
  var DEFAULT_TYPES = ['24시간(JTBC빌딩)', '2시간(JTBC빌딩)', '24시간(중앙일보빌딩)'];
  var DEFAULT_PURPOSES = ['출연', '업무협의'];

  function todayStr() {
    var d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
  }
  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function(c){
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  function renderForm() {
    var root = document.getElementById('app-root');
    root.innerHTML =
      '<div class="ledger-header">' +
        '<h1 class="ledger-title">주차권 수령 등록</h1>' +
        '<p class="ledger-sub">여러 종류를 한 번에 받아가시는 경우, 아래 표에서 항목을 추가해 함께 입력해 주세요.</p>' +
      '</div>' +
      '<div class="section">' +
        '<div class="card">' +
          '<div class="field-row">' +
            '<div class="field"><label>일자</label><input type="date" id="f-date"></div>' +
            '<div class="field"><label>부서(프로그램명)</label><input type="text" id="f-dept" placeholder="예: 뉴스룸, OO프로그램"></div>' +
            '<div class="field"><label>수령인</label><input type="text" id="f-receiver" placeholder="주차권을 받아가는 사람"></div>' +
          '</div>' +
          '<table class="items-table" id="items-table">' +
            '<thead><tr><th style="width:22%">주차권 종류</th><th style="width:22%">용도(직접 입력 가능)</th><th style="width:18%">차량번호</th><th style="width:22%">사용자(출연자 등)</th><th style="width:4%"></th></tr></thead>' +
            '<tbody id="items-body"></tbody>' +
          '</table>' +
          '<datalist id="dl-type">' + DEFAULT_TYPES.map(function(t){ return '<option value="'+escapeHtml(t)+'">'; }).join('') + '</datalist>' +
          '<datalist id="dl-purpose">' + DEFAULT_PURPOSES.map(function(p){ return '<option value="'+escapeHtml(p)+'">'; }).join('') + '</datalist>' +
          '<button class="btn-add-row" id="btn-add-item" type="button">+ 항목 추가</button>' +
          '<div class="actions-row">' +
            '<span class="msg-inline" id="msg-error">일자, 부서, 수령인과 최소 1개 항목(종류)을 입력해 주세요.</span>' +
            '<button class="btn-submit" id="btn-submit" type="button">등록하기</button>' +
          '</div>' +
        '</div>' +
      '</div>';

    document.getElementById('f-date').value = todayStr();
    addItemRow();
    document.getElementById('btn-add-item').addEventListener('click', function(){ addItemRow(); });
    document.getElementById('btn-submit').addEventListener('click', handleSubmit);
  }

  function addItemRow() {
    var tbody = document.getElementById('items-body');
    var tr = document.createElement('tr');
    tr.innerHTML =
      '<td><input type="text" class="row-type" list="dl-type"></td>' +
      '<td><input type="text" class="row-purpose" list="dl-purpose" placeholder="예: 출연"></td>' +
      '<td><input type="text" class="row-car" placeholder="123가4567"></td>' +
      '<td><input type="text" class="row-person" placeholder="실제 사용자"></td>' +
      '<td><button type="button" class="row-remove">&times;</button></td>';
    tbody.appendChild(tr);
    tr.querySelector('.row-remove').addEventListener('click', function(){
      if (document.getElementById('items-body').children.length > 1) {
        tr.remove();
      } else {
        tr.querySelectorAll('input').forEach(function(i){ i.value = ''; });
      }
    });
  }

  function handleSubmit() {
    var date = document.getElementById('f-date').value;
    var dept = document.getElementById('f-dept').value.trim();
    var receiver = document.getElementById('f-receiver').value.trim();
    var rows = Array.from(document.getElementById('items-body').children);
    var items = [];
    var errEl = document.getElementById('msg-error');

    rows.forEach(function(tr){
      var type = tr.querySelector('.row-type').value.trim();
      var purpose = tr.querySelector('.row-purpose').value.trim();
      var car = tr.querySelector('.row-car').value.trim();
      var person = tr.querySelector('.row-person').value.trim();
      if (type) items.push({ type: type, purpose: purpose, car: car, person: person });
    });

    if (!date || !dept || !receiver || items.length === 0) {
      errEl.style.display = 'inline';
      return;
    }
    errEl.style.display = 'none';

    var btn = document.getElementById('btn-submit');
    btn.disabled = true;
    btn.textContent = '등록 중...';

    fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ date: date, dept: dept, receiver: receiver, items: items })
    })
      .then(function(res){
        if (!res.ok) return res.json().then(function(d){ throw new Error(d.error || '등록 실패'); });
        return res.json();
      })
      .then(function(){ renderThankYou(); })
      .catch(function(err){
        btn.disabled = false;
        btn.textContent = '등록하기';
        alert('등록 중 오류가 발생했습니다: ' + err.message);
      });
  }

  function renderThankYou() {
    var root = document.getElementById('app-root');
    root.innerHTML =
      '<div class="ledger-header"><h1 class="ledger-title">주차권 수령 등록</h1></div>' +
      '<div class="thankyou">' +
        '<h2>등록이 완료되었습니다</h2>' +
        '<p>주차권 수령 내역이 정상적으로 저장되었습니다.</p>' +
        '<button class="btn-submit" id="btn-again" type="button">다른 건 추가 등록하기</button>' +
      '</div>';
    document.getElementById('btn-again').addEventListener('click', renderForm);
  }

  renderForm();
</script>
</body>
</html>
